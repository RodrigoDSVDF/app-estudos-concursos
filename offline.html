<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Aprovado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a1424 0%, #0f1f3a 50%, #0a1424 100%);
      color: #e8ecf2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 480px;
      background: rgba(255, 255, 255, 0.98);
      color: #0f1f3a;
      border-radius: 20px;
      padding: 48px 32px;
      box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.4);
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #1e3a5f, #0a1424);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 48px; height: 48px; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #0f1f3a;
    }
    p {
      font-size: 14px;
      line-height: 1.6;
      color: #4a5568;
      margin-bottom: 20px;
    }
    .brand {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e1e5ec;
      font-size: 11px;
      color: #8a93a3;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    button {
      background: #1e3a5f;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 180ms;
      font-family: inherit;
    }
    button:hover { background: #0f1f3a; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: #fbe5e5;
      color: #b83232;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 20px;
    }
    .status::before {
      content: '';
      width: 6px; height: 6px;
      background: #b83232;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 24 L21 31 L34 17" stroke="#c9a961" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="status">Você está offline</div>
    <h1>Aprovado</h1>
    <p>
      Sem conexão com a internet no momento. Você ainda pode visualizar dados
      já carregados, mas não será possível salvar novas sessões até voltar online.
    </p>
    <button onclick="location.reload()">Tentar novamente</button>
    <div class="brand">Aprovado · Plataforma de estudos</div>
  </div>
  <script>
    // Quando voltar a conexão, recarrega automaticamente
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
