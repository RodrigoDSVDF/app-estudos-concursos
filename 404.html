<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>404 — Aprovado</title>
  <meta http-equiv="refresh" content="3; url=./" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f7f8fa;
      color: #1a1f2c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .box { max-width: 500px; }
    h1 { font-size: 72px; margin: 0; color: #4f46e5; }
    p { font-size: 16px; color: #5b6473; margin: 16px 0; }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #4f46e5;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Página não encontrada. Redirecionando para a página inicial...</p>
    <a href="./">Ir para o app</a>
  </div>
  <script>
    // Redirecionamento inteligente: tenta a raiz do repo
    const path = window.location.pathname;
    const repoBase = path.substring(0, path.lastIndexOf('/'));
    setTimeout(() => {
      window.location.href = repoBase + '/';
    }, 1500);
  </script>
</body>
</html>
